<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Blindtest</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #222; height: 100dvh; display: flex; flex-direction: column; }
      .header { padding: 16px 20px 0; text-align: center; }
      .header h1 { font-size: 1.3rem; margin-bottom: 4px; }
      .header p { font-size: 0.85rem; color: #666; margin-bottom: 12px; }
      .tabs { display: flex; gap: 4px; justify-content: center; padding: 0 20px 12px; }
      .tab { padding: 8px 20px; border: 1px solid #ccc; border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.9rem; position: relative; transition: background 0.15s; }
      .tab.active { background: #222; color: #fff; border-color: #222; }
      .tab .dot { display: none; position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: #e74c3c; border-radius: 50%; }
      .tab .dot.visible { display: block; }
      .reset-btn { position: absolute; top: 8px; right: 12px; background: none; border: 1px solid #ccc; border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; cursor: pointer; color: #888; }
      .reset-btn:hover { background: #eee; color: #222; }
      .chat-container { flex: 1; overflow-y: auto; padding: 0 20px 12px; position: relative; }
      .chat { display: none; flex-direction: column; gap: 10px; min-height: 100%; justify-content: flex-end; }
      .chat.active { display: flex; }
      .bubble { max-width: 80%; padding: 10px 14px; border-radius: 14px; font-size: 0.95rem; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
      .bubble.user { align-self: flex-end; background: #222; color: #fff; border-bottom-right-radius: 4px; }
      .bubble.assistant { align-self: flex-start; background: #fff; border: 1px solid #ddd; border-bottom-left-radius: 4px; }
      .bubble.loading { color: #999; font-style: italic; }
      .input-area { padding: 12px 20px; background: #f5f5f5; border-top: 1px solid #ddd; display: flex; gap: 8px; }
      .input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 0.95rem; outline: none; }
      .input-area input:focus { border-color: #222; }
      .input-area button { padding: 10px 18px; background: #222; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
      .input-area button:disabled { opacity: 0.5; cursor: default; }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>AI Blindtest</h1>
      <p>Chatte mit drei KI-Modellen — welches gefällt dir am besten?</p>
    </div>
    <div class="tabs">
      <div class="tab active" data-idx="0">Modell A<span class="dot"></span></div>
      <div class="tab" data-idx="1">Modell B<span class="dot"></span></div>
      <div class="tab" data-idx="2">Modell C<span class="dot"></span></div>
    </div>
    <div class="chat-container">
      <button class="reset-btn" id="reset">Zurücksetzen</button>
      <div class="chat active" data-idx="0"></div>
      <div class="chat" data-idx="1"></div>
      <div class="chat" data-idx="2"></div>
    </div>
    <div class="input-area">
      <input type="text" id="msg" placeholder="Nachricht eingeben..." autocomplete="off">
      <button id="send">Senden</button>
    </div>

    <script>
      // Seeded PRNG (mulberry32) for stable shuffle across reloads
      function mulberry32(a) { return () => { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t ^= t + Math.imul(t ^ t >>> 7, 61 | t); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
      const rng = mulberry32(42);
      const models = ["openai/gpt-5.3-chat", "anthropic/claude-opus-4-6", "google/gemini-3.1-pro-preview"];
      for (let i = models.length - 1; i > 0; i--) {
        const j = Math.floor(rng() * (i + 1));
        [models[i], models[j]] = [models[j], models[i]];
      }

      const histories = [[], [], []]; // per-model message histories
      const pending = [false, false, false];
      let activeTab = 0;

      const tabs = document.querySelectorAll(".tab");
      const chats = document.querySelectorAll(".chat");
      const input = document.getElementById("msg");
      const sendBtn = document.getElementById("send");

      tabs.forEach(tab => {
        tab.addEventListener("click", () => {
          activeTab = +tab.dataset.idx;
          tabs.forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          tab.querySelector(".dot").classList.remove("visible");
          chats.forEach(c => c.classList.remove("active"));
          chats[activeTab].classList.add("active");
          chats[activeTab].scrollTop = chats[activeTab].scrollHeight;
        });
      });

      function addBubble(idx, role, text, isLoading) {
        const chat = chats[idx];
        const div = document.createElement("div");
        div.className = `bubble ${role}` + (isLoading ? " loading" : "");
        div.textContent = text;
        chat.appendChild(div);
        if (idx === activeTab) chat.parentElement.scrollTop = chat.parentElement.scrollHeight;
        return div;
      }

      async function sendToModel(idx, userMsg) {
        histories[idx].push({ role: "user", content: userMsg });
        const loader = addBubble(idx, "assistant", "Antwort wird generiert…", true);
        pending[idx] = true;

        const res = await fetch("https://japhba-api.netlify.app/.netlify/functions/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: models[idx], messages: histories[idx] }),
        });
        const data = await res.json();
        const reply = data.choices[0].message.content;
        histories[idx].push({ role: "assistant", content: reply });

        loader.remove();
        addBubble(idx, "assistant", reply, false);
        pending[idx] = false;

        if (idx !== activeTab) {
          tabs[idx].querySelector(".dot").classList.add("visible");
        }
      }

      function send() {
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        const idx = activeTab;

        addBubble(idx, "user", text, false);
        sendBtn.disabled = true;
        input.disabled = true;

        sendToModel(idx, text).finally(() => {
          sendBtn.disabled = false;
          input.disabled = false;
          input.focus();
        });
      }

      document.getElementById("reset").addEventListener("click", () => {
        const idx = activeTab;
        histories[idx] = [];
        chats[idx].innerHTML = "";
      });

      sendBtn.addEventListener("click", send);
      input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
      input.focus();
    </script>
  </body>
</html>
